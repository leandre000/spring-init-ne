# ============================================================
# Application
# ============================================================
spring.application.name=UtilityBillingSystem

# Imports the local override file if it exists.
# application-local.properties is gitignored — put real credentials there.
# The "optional:" prefix means the app still starts if the file is absent
# (e.g. in CI/CD where credentials come from environment variables instead).
spring.config.import=optional:classpath:application-local.properties

# ============================================================
# Database (PostgreSQL)
# ============================================================
# These are placeholder values overridden by application-local.properties locally
# and by environment variables / secrets manager in production.
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/your_database
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Flyway
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ============================================================
# JWT
# ============================================================
# Generate with: openssl rand -base64 32
# Must be Base64-encoded and at least 256 bits (32 bytes) for HS256.
app.jwt.secret=change-me-generate-with-openssl-rand-base64-32
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=${spring.application.name}

# ============================================================
# Spring Security
# ============================================================
app.security.public-paths[0]=/api/v1/auth/**
app.security.public-paths[1]=/v3/api-docs/**
app.security.public-paths[2]=/swagger-ui/**
app.security.public-paths[3]=/swagger-ui.html
app.security.public-paths[4]=/actuator/health

# ============================================================
# Mail (SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=noreply@yourdomain.com
app.mail.from-name=UtilityBillingSystem
app.mail.base-url=http://localhost:8080

# ============================================================
# Async (email thread pool)
# ============================================================
app.async.core-pool-size=2
app.async.max-pool-size=5
app.async.queue-capacity=100
app.async.thread-name-prefix=async-email-

# ============================================================
# Token expiry
# ============================================================
app.auth.password-reset-token-expiry-minutes=15
app.auth.verification-token-expiry-hours=24
