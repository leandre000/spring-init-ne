<!DOCTYPE html>
<html lang="en">
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: auto; padding: 24px;">

  <h2 style="color: #4F46E5;">Welcome to {{appName}}, {{firstName}}!</h2>

  <p>Please verify your email address by clicking the button below.</p>

  <p style="margin: 32px 0;">
    <a href="{{confirmUrl}}"
       style="display:inline-block; padding:12px 28px; background:#4F46E5;
              color:#fff; text-decoration:none; border-radius:6px; font-weight:bold;">
      Verify Email
    </a>
  </p>

  <p>Or copy this link into your browser:</p>
  <p style="word-break: break-all;">
    <a href="{{confirmUrl}}" style="color:#4F46E5;">{{confirmUrl}}</a>
  </p>

  <p style="color: #666;">This link expires in <strong>24 hours</strong>.</p>

  <hr style="border: none; border-top: 1px solid #eee; margin: 32px 0;"/>

  <p style="font-size:12px; color:#999;">
    If you did not create an account with {{appName}}, you can safely ignore this email.
  </p>

</body>
</html>
